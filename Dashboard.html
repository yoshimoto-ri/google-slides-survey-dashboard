<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AI工具使用調查 ── 即時儀表板</title>
  <style>
    /* ── Reset & Base ─────────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg:        #0d1117;
      --panel:     #161b22;
      --border:    #30363d;
      --blue:      #58a6ff;
      --green:     #3fb950;
      --purple:    #bc8cff;
      --orange:    #f0883e;
      --text:      #e6edf3;
      --muted:     #8b949e;
      --live:      #56d364;
      --accent-bg: rgba(88,166,255,0.08);
    }
    html, body { height: 100%; overflow: hidden; }
    body {
      font-family: 'Google Sans', 'Noto Sans TC', Arial, sans-serif;
      background: var(--bg);
      color: var(--text);
    }

    /* ── Layout ──────────────────────────────────────── */
    .root {
      display: grid;
      grid-template-rows: 52px 1fr;
      height: 100vh;
    }
    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 20px;
      background: var(--panel);
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }
    header h1 { font-size: 17px; font-weight: 700; color: var(--blue); letter-spacing: .3px; }
    .live-badge {
      display: flex; align-items: center; gap: 6px;
      font-size: 12px; color: var(--live);
      background: rgba(56,211,100,.12);
      border: 1px solid rgba(56,211,100,.3);
      padding: 3px 10px; border-radius: 20px;
    }
    .dot {
      width: 7px; height: 7px; border-radius: 50%;
      background: var(--live);
      animation: blink 1.4s ease-in-out infinite;
    }
    @keyframes blink { 0%,100%{opacity:1} 50%{opacity:.2} }

    .main {
      display: grid;
      grid-template-columns: 320px 1fr;
      gap: 0;
      overflow: hidden;
    }

    /* ── Left Panel ──────────────────────────────────── */
    .left {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 24px;
      padding: 20px 16px;
      border-right: 1px solid var(--border);
      background: var(--panel);
    }

    /* QR Code */
    .qr-wrapper {
      background: white;
      border-radius: 16px;
      padding: 14px;
      box-shadow: 0 0 32px rgba(88,166,255,.18);
    }
    .qr-wrapper img { display: block; width: 200px; height: 200px; }
    .qr-label {
      text-align: center;
      font-size: 14px;
      color: var(--muted);
      line-height: 1.5;
    }
    .qr-label strong { display: block; color: var(--blue); font-size: 15px; margin-bottom: 2px; }

    /* Counter */
    .counter-block { text-align: center; }
    .counter-caption {
      font-size: 13px; color: var(--muted);
      display: flex; align-items: center; justify-content: center; gap: 6px;
      margin-bottom: 6px;
    }
    .counter-num {
      font-size: 86px;
      font-weight: 900;
      line-height: 1;
      background: linear-gradient(135deg, var(--blue), var(--purple));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      transition: all .3s;
    }
    .counter-num.bump { transform: scale(1.12); }
    .counter-unit { font-size: 16px; color: var(--muted); margin-top: 4px; }

    /* Divider */
    .divider { width: 60%; height: 1px; background: var(--border); }

    /* Refresh info */
    .refresh-note { font-size: 11px; color: var(--border); }

    /* ── Right Panel ─────────────────────────────────── */
    .right {
      display: flex;
      flex-direction: column;
      padding: 16px 18px;
      gap: 14px;
      overflow: hidden;
    }

    /* Tabs */
    .tabs { display: flex; gap: 6px; flex-shrink: 0; }
    .tab {
      padding: 7px 16px;
      border-radius: 8px;
      border: 1px solid var(--border);
      background: transparent;
      color: var(--muted);
      cursor: pointer;
      font-size: 13px;
      font-family: inherit;
      transition: all .2s;
    }
    .tab:hover { border-color: var(--blue); color: var(--blue); }
    .tab.active {
      background: var(--accent-bg);
      border-color: var(--blue);
      color: var(--blue);
      font-weight: 600;
    }

    /* Panel Content */
    .panel-content { flex: 1; overflow: hidden; position: relative; }
    .panel { display: none; height: 100%; flex-direction: column; gap: 12px; }
    .panel.active { display: flex; }

    /* ── Gemini Panel ────────────────────────────────── */
    .gemini-btn {
      flex-shrink: 0;
      width: 100%;
      padding: 13px;
      border: none;
      border-radius: 10px;
      background: linear-gradient(135deg, #1a73e8, #7c3aed);
      color: white;
      font-size: 15px;
      font-weight: 700;
      font-family: inherit;
      cursor: pointer;
      transition: all .25s;
      box-shadow: 0 4px 16px rgba(26,115,232,.3);
      display: flex; align-items: center; justify-content: center; gap: 8px;
    }
    .gemini-btn:hover:not(:disabled) {
      transform: translateY(-1px);
      box-shadow: 0 6px 20px rgba(26,115,232,.45);
    }
    .gemini-btn:disabled { opacity: .55; cursor: not-allowed; transform: none; }

    .summary-box {
      flex: 1;
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 18px 20px;
      overflow-y: auto;
      font-size: 15px;
      line-height: 1.85;
      color: var(--text);
    }
    .summary-box::-webkit-scrollbar { width: 6px; }
    .summary-box::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

    .placeholder {
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      height: 100%; gap: 10px;
      color: var(--muted); text-align: center; font-size: 14px;
    }
    .placeholder .icon { font-size: 40px; }

    /* Loading spinner */
    .loading-wrap { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100%; gap: 14px; }
    .spinner {
      width: 36px; height: 36px;
      border: 3px solid var(--border);
      border-top-color: var(--blue);
      border-radius: 50%;
      animation: spin .8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .loading-txt { font-size: 14px; color: var(--muted); }

    /* Markdown-like rendering */
    .md-bold { font-weight: 700; color: var(--text); }
    .md-head  { display: block; font-size: 16px; font-weight: 700; margin: 12px 0 6px; color: var(--blue); }
    .error-box {
      background: rgba(248,81,73,.1);
      border: 1px solid rgba(248,81,73,.3);
      border-radius: 8px;
      padding: 14px 16px;
      color: #f85149;
      font-size: 14px;
      white-space: pre-wrap;
    }

    /* ── Results Panel ───────────────────────────────── */
    .results-panel { flex: 1; overflow-y: auto; }
    .results-panel::-webkit-scrollbar { width: 6px; }
    .results-panel::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

    .no-data {
      text-align: center;
      color: var(--muted);
      padding: 30px;
      font-size: 14px;
    }
    .load-results-btn {
      flex-shrink: 0;
      padding: 10px;
      border: 1px solid var(--border);
      background: transparent;
      color: var(--muted);
      border-radius: 8px;
      cursor: pointer;
      font-size: 13px;
      font-family: inherit;
      transition: all .2s;
    }
    .load-results-btn:hover { border-color: var(--green); color: var(--green); }

    /* ── Question Cards ─────────────────────────── */
    .cards-grid {
      display: flex;
      flex-direction: column;
      gap: 14px;
      padding: 2px 2px 16px;
    }
    .q-card {
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 12px;
      overflow: hidden;
    }
    .q-card-header {
      background: var(--accent-bg);
      border-bottom: 1px solid var(--border);
      padding: 10px 14px;
      font-size: 13px;
      font-weight: 700;
      color: var(--blue);
      display: flex;
      gap: 8px;
      align-items: flex-start;
    }
    .q-num {
      background: var(--blue);
      color: #0d1117;
      border-radius: 4px;
      padding: 1px 6px;
      font-size: 11px;
      font-weight: 800;
      flex-shrink: 0;
      margin-top: 1px;
    }
    .q-title { flex: 1; line-height: 1.4; }
    .q-card-body { padding: 12px 14px; display: flex; flex-direction: column; gap: 6px; }
    .q-count { font-size: 11px; color: var(--muted); margin-bottom: 4px; }

    /* Choice bar */
    .choice-row { margin-bottom: 5px; }
    .choice-label {
      display: flex; justify-content: space-between;
      font-size: 13px; color: var(--text);
      margin-bottom: 3px;
    }
    .choice-pct { color: var(--muted); font-size: 12px; }
    .bar-bg {
      height: 7px; background: var(--border); border-radius: 4px; overflow: hidden;
    }
    .bar-fill {
      height: 100%;
      background: linear-gradient(90deg, var(--blue), var(--purple));
      border-radius: 4px;
      transition: width .6s ease;
    }

    /* Text responses */
    .text-item {
      font-size: 13px; color: var(--text);
      padding: 6px 10px;
      background: rgba(255,255,255,.03);
      border-left: 2px solid var(--border);
      border-radius: 0 6px 6px 0;
      line-height: 1.5;
    }
    .text-item:hover { border-left-color: var(--blue); background: var(--accent-bg); }
    .no-resp { font-size: 12px; color: var(--border); font-style: italic; }
  </style>
</head>
<body>
<div class="root">

  <!-- Header -->
  <header>
    <h1>📊 AI工具使用調查 ── 即時儀表板</h1>
    <div class="live-badge">
      <span class="dot"></span>
      即時更新中（每 5 秒）
    </div>
  </header>

  <!-- Main -->
  <div class="main">

    <!-- ── Left: QR + Counter ── -->
    <div class="left">
      <!-- QR Code -->
      <div>
        <div class="qr-wrapper">
          <img id="qrImg" src="" alt="QR Code 載入中..." />
        </div>
        <div class="qr-label" style="margin-top:10px;">
          <strong>📱 掃描填寫問卷</strong>
          AI工具使用調查
        </div>
      </div>

      <div class="divider"></div>

      <!-- Response Counter -->
      <div class="counter-block">
        <div class="counter-caption">
          <span class="dot" style="background:var(--blue);"></span>
          累積完成筆數
        </div>
        <div class="counter-num" id="counterNum">—</div>
        <div class="counter-unit">筆回應</div>
      </div>

      <div class="refresh-note" id="refreshNote">初始化中…</div>
    </div>

    <!-- ── Right: Tabs ── -->
    <div class="right">
      <!-- Tabs -->
      <div class="tabs">
        <button class="tab active" onclick="switchTab('gemini', this)">✨ Gemini AI 歸納</button>
        <button class="tab" onclick="switchTab('results', this)">📋 查看所有回應</button>
      </div>

      <div class="panel-content">

        <!-- Gemini Panel -->
        <div class="panel active" id="panel-gemini">
          <button class="gemini-btn" id="geminiBtn" onclick="runGemini()">
            <span>✨</span> 立即由 Gemini AI 歸納開放回應
          </button>
          <div class="summary-box" id="summaryBox">
            <div class="placeholder">
              <div class="icon">🤖</div>
              <div>點擊上方按鈕</div>
              <div>Gemini 將即時歸納學員的開放式回應</div>
              <div style="margin-top:8px;font-size:12px;color:var(--border);">讓學員親眼看到 AI 在做什麼！</div>
            </div>
          </div>
        </div>

        <!-- Results Panel -->
        <div class="panel" id="panel-results">
          <button class="load-results-btn" id="loadResultsBtn" onclick="loadResults()">🔄 載入 / 重新整理全部回應</button>
          <div class="results-panel" id="resultsPanel">
            <div class="no-data">點擊上方按鈕載入回應</div>
          </div>
        </div>

      </div><!-- /panel-content -->
    </div><!-- /right -->

  </div><!-- /main -->
</div><!-- /root -->

<script>
  // ── State ──────────────────────────────────────────────────────────
  let currentCount = -1;
  let refreshTimer  = null;

  // ── Init ───────────────────────────────────────────────────────────
  document.addEventListener('DOMContentLoaded', init);

  function init() {
    // Get config (form URL) and set QR code
    google.script.run
      .withSuccessHandler(function(cfg) {
        const formUrl = cfg.formUrl;
        if (!formUrl || formUrl === 'YOUR_GOOGLE_FORM_URL') {
          document.getElementById('qrImg').alt = '⚠️ 尚未設定 Form URL，請先到「⚙️ 初始設定」填入';
          document.getElementById('refreshNote').textContent = '請先完成初始設定';
          return;
        }
        // QR Code via api.qrserver.com（免費、免 API Key）
        const qrUrl = 'https://api.qrserver.com/v1/create-qr-code/?size=200x200&margin=0&data='
                      + encodeURIComponent(formUrl);
        document.getElementById('qrImg').src = qrUrl;

        // Start polling
        updateCount();
        refreshTimer = setInterval(updateCount, 5000);
      })
      .withFailureHandler(function(err) {
        setNote('❌ 無法取得設定：' + err);
      })
      .getConfig();
  }

  // ── Counter Polling ────────────────────────────────────────────────
  function updateCount() {
    google.script.run
      .withSuccessHandler(function(result) {
        if (result.error) {
          setNote('⚠️ ' + result.error);
          return;
        }
        const n = result.count;
        if (n !== currentCount) {
          animateTo(n);
          currentCount = n;
        }
        setNote('上次更新：' + new Date().toLocaleTimeString('zh-TW'));
      })
      .withFailureHandler(function(err) {
        setNote('❌ 讀取失敗：' + err);
      })
      .getResponseCount();
  }

  function animateTo(target) {
    const el   = document.getElementById('counterNum');
    const start = currentCount < 0 ? 0 : currentCount;
    const diff  = target - start;
    if (diff === 0) return;

    // Small bounce animation
    el.classList.remove('bump');
    void el.offsetWidth; // reflow
    el.classList.add('bump');
    setTimeout(() => el.classList.remove('bump'), 400);

    // Count-up animation
    const steps = Math.min(Math.abs(diff), 30);
    let step = 0;
    const timer = setInterval(() => {
      step++;
      el.textContent = Math.round(start + diff * (step / steps));
      if (step >= steps) {
        el.textContent = target;
        clearInterval(timer);
      }
    }, 30);
  }

  function setNote(msg) {
    document.getElementById('refreshNote').textContent = msg;
  }

  // ── Tabs ───────────────────────────────────────────────────────────
  function switchTab(name, btnEl) {
    document.querySelectorAll('.tab').forEach(b => b.classList.remove('active'));
    document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
    btnEl.classList.add('active');
    document.getElementById('panel-' + name).classList.add('active');
  }

  // ── Gemini Summary ─────────────────────────────────────────────────
  function runGemini() {
    const btn = document.getElementById('geminiBtn');
    const box = document.getElementById('summaryBox');

    btn.disabled = true;
    btn.innerHTML = '<div class="spinner" style="width:18px;height:18px;border-width:2px;"></div> Gemini 分析中…';

    box.innerHTML = `
      <div class="loading-wrap">
        <div class="spinner"></div>
        <div class="loading-txt">Gemini AI 正在閱讀並歸納學員的回應…<br><span style="font-size:12px;color:var(--border);">通常需要 5~15 秒</span></div>
      </div>`;

    google.script.run
      .withSuccessHandler(function(result) {
        btn.disabled = false;
        btn.innerHTML = '<span>🔄</span> 重新歸納';

        if (result.error) {
          box.innerHTML = '<div class="error-box">❌ ' + escHtml(result.error) + '</div>';
          return;
        }
        box.innerHTML = renderMarkdown(result.summary);
      })
      .withFailureHandler(function(err) {
        btn.disabled = false;
        btn.innerHTML = '<span>✨</span> 立即由 Gemini AI 歸納開放回應';
        box.innerHTML = '<div class="error-box">❌ 發生錯誤：' + escHtml(err) + '</div>';
      })
      .runGeminiSummary();
  }

  // ── Results Table ──────────────────────────────────────────────────
  function loadResults() {
    const panel = document.getElementById('resultsPanel');
    const btn   = document.getElementById('loadResultsBtn');
    btn.disabled = true;
    btn.textContent = '⏳ 載入中…';
    panel.innerHTML = '<div class="no-data">讀取資料中…</div>';

    google.script.run
      .withSuccessHandler(function(data) {
        btn.disabled = false;
        btn.textContent = '🔄 載入 / 重新整理全部回應';

        if (data.error) {
          panel.innerHTML = '<div class="error-box">❌ ' + escHtml(data.error) + '</div>';
          return;
        }
        if (!data.rows || data.rows.length === 0) {
          panel.innerHTML = '<div class="no-data">目前尚無回應資料</div>';
          return;
        }

        panel.innerHTML = '<div class="cards-grid">' + buildCards(data) + '</div>';
      })
      .withFailureHandler(function(err) {
        btn.disabled = false;
        btn.textContent = '🔄 載入 / 重新整理全部回應';
        panel.innerHTML = '<div class="error-box">❌ ' + escHtml(err) + '</div>';
      })
      .getAllResponses();
  }

  // ── Card Builder ───────────────────────────────────────────────────
  function buildCards(data) {
    // data.headers[0] = 時間戳記 → 只跳過第 0 欄
    const startCol = 1;
    let html = '';
    let qNum = 1;

    // Pre-group: if col N is "如果您選擇了「其他」..." treat it as companion of col N-1
    const companions = {}; // colIdx → belongs to previous card
    data.headers.forEach((h, i) => {
      if (i < startCol) return;
      if (String(h).includes('如果您選擇了') || String(h).includes('請說明') ||
          String(h).includes('請簡述') || String(h).match(/^如果.+「其他」/)) {
        companions[i] = i - 1;
      }
    });

    for (let i = startCol; i < data.headers.length; i++) {
      if (companions[i] !== undefined) continue; // rendered with parent

      const header = data.headers[i];
      const responses = data.rows.map(r => r[i]).filter(v => v && String(v).trim());

      // Check for companion (e.g. "其他說明" of this question)
      let companionIdx = null;
      if (companions[i + 1] === i) companionIdx = i + 1;

      html += `<div class="q-card">`;
      html += `<div class="q-card-header">
        <span class="q-num">Q${qNum}</span>
        <span class="q-title">${escHtml(header)}</span>
      </div>`;
      html += `<div class="q-card-body">`;
      html += `<div class="q-count">共 ${responses.length} 份回應</div>`;

      if (responses.length === 0) {
        html += '<div class="no-resp">尚無回應</div>';
      } else {
        // 先把所有回應用 smartSplit 拆開成個別選項，再統計頻率
        // 這樣複選題（每筆值是 "A, B, C" 組合）也能正確計算
        const counts = {};
        responses.forEach(r => {
          smartSplit(String(r)).map(s => normalizeOption(s)).filter(Boolean).forEach(s => {
            counts[s] = (counts[s] || 0) + 1;
          });
        });
        const uniqueOptions = Object.keys(counts);

        // 判斷是選擇題：選項種類 ≤ 25（選擇題的預設選項固定，不會隨人數增加）
        // 且至少一個選項被超過一位學員選到
        const isChoice = uniqueOptions.length <= 25 &&
                         uniqueOptions.some(opt => counts[opt] > 1);

        if (isChoice) {
          // 選擇題 / 複選題 → 長條圖
          const sorted = Object.entries(counts).sort((a, b) => b[1] - a[1]);
          sorted.forEach(([val, cnt]) => {
            const pct = Math.round(cnt / responses.length * 100);
            html += `<div class="choice-row">
              <div class="choice-label">
                <span>${escHtml(val)}</span>
                <span class="choice-pct">${cnt}人 · ${pct}%</span>
              </div>
              <div class="bar-bg"><div class="bar-fill" style="width:${pct}%"></div></div>
            </div>`;
          });
        } else {
          // 開放式問題 → 文字列表
          responses.forEach(r => {
            html += `<div class="text-item">${escHtml(r)}</div>`;
          });
        }
      }

      // Companion (「其他請說明」) on same card
      if (companionIdx !== null) {
        const cHeader = data.headers[companionIdx];
        const cResponses = data.rows.map(r => r[companionIdx]).filter(v => v && String(v).trim());
        if (cResponses.length > 0) {
          html += `<div style="margin-top:10px;padding-top:10px;border-top:1px solid var(--border);">
            <div class="q-count" style="color:var(--orange);">📝 ${escHtml(cHeader)}</div>`;
          cResponses.forEach(r => {
            html += `<div class="text-item">${escHtml(r)}</div>`;
          });
          html += '</div>';
        }
      }

      html += '</div></div>';
      qNum++;
    }
    return html;
  }

  // ── Multi-select 智慧分割 ──────────────────────────────────────────
  // 只在括號「外面」的逗號才切分，避免選項名稱中的逗號被誤切
  function smartSplit(str) {
    const parts = [];
    let depth = 0;
    let current = '';
    for (let i = 0; i < str.length; i++) {
      const ch = str[i];
      if (ch === '(' || ch === '（') depth++;
      else if (ch === ')' || ch === '）') depth--;
      if ((ch === ',' || ch === '，') && depth === 0) {
        const t = current.trim();
        if (t) parts.push(t);
        current = '';
      } else {
        current += ch;
      }
    }
    const t = current.trim();
    if (t) parts.push(t);
    return parts;
  }

  // 把「生成式AI (如：ChatGPT, Gemini, Claude)」→「生成式AI」
  // 讓有例子說明和沒有說明的同一選項可以合併計算
  function normalizeOption(opt) {
    return opt
      .replace(/\s*[（(]如[：:][^）)]*[）)]/g, '') // 移除 (如：...) 說明
      .replace(/\s*[（(]請[^）)]*[）)]/g, '')       // 移除 (請...) 說明
      .trim();
  }

  // ── Helpers ────────────────────────────────────────────────────────
  function escHtml(s) {
    return String(s)
      .replace(/&/g,'&amp;')
      .replace(/</g,'&lt;')
      .replace(/>/g,'&gt;')
      .replace(/"/g,'&quot;');
  }

  function renderMarkdown(text) {
    // 簡易 Markdown 渲染（bold, line breaks）
    let html = escHtml(text);
    // **bold**
    html = html.replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>');
    // 行首 #
    html = html.replace(/(^|\n)(#{1,3}) (.+)/g, function(m, pre, hashes, content) {
      return pre + '<span class="md-head">' + content + '</span>';
    });
    // Newlines
    html = html.replace(/\n/g, '<br>');
    return '<div style="white-space:normal;">' + html + '</div>';
  }
</script>
</body>
